name: 3cx-mcp-server
description: MCP Server for 3CX Phone System (V20+)
author: SSIG-IT GmbH
homepage: https://github.com/SSIG-IT/3cx-mcp-server
tags:
  - telephony
  - pbx
  - 3cx
  - voip
  - msp
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      TCX_FQDN:
        type: string
        description: "3CX hostname (e.g. company.my3cx.de)"
      TCX_PORT:
        type: string
        default: "443"
        description: "API port (443 for hosted, 5001 for self-hosted)"
      TCX_CLIENT_ID:
        type: string
        description: "Service Principal Client ID (numeric)"
      TCX_CLIENT_SECRET:
        type: string
        description: "API Secret from 3CX"
    required:
      - TCX_FQDN
      - TCX_CLIENT_ID
      - TCX_CLIENT_SECRET
  commandFunction: |
    (config) => ({
      command: "node",
      args: ["build/index.js"],
      env: {
        TCX_FQDN: config.TCX_FQDN,
        TCX_PORT: config.TCX_PORT || "443",
        TCX_CLIENT_ID: config.TCX_CLIENT_ID,
        TCX_CLIENT_SECRET: config.TCX_CLIENT_SECRET
      }
    })
